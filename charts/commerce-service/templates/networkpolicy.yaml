{{- if .Values.networkPolicy.enabled -}}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "commerce-service.fullname" . }}
  labels:
    {{- include "commerce-service.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      {{- include "commerce-service.selectorLabels" . | nindent 6 }}
  policyTypes:
    - Ingress
    - Egress
  ingress:
    {{- toYaml .Values.networkPolicy.ingress | nindent 4 }}
  egress:
    # Allow all outbound traffic (for DynamoDB, S3, EventBridge, SNS endpoints)
    - {}
{{- end -}}
