{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "commerce-service.fullname" . }}-secret
  labels:
    {{- include "commerce-service.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $val := .Values.secrets }}
  {{ $key }}: {{ $val | b64enc | quote }}
  {{- end }}
{{- end }}
