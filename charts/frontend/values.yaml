replicaCount: 1

image:
  repository: fanvault-frontend
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80

containerPort: 80

resources:
  requests:
    cpu: "50m"
    memory: "64Mi"
  limits:
    cpu: "250m"
    memory: "256Mi"

securityContext:
  runAsNonRoot: true
  runAsUser: 101
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  ingress:
    # Allow traffic from gateway/ingress on port 80
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/component: gateway

# ServiceAccount variables
serviceAccount:
  create: true
  name: ""
  annotations: {}

# Nginx reverse proxy values for local/VPC loopback proxy routes
config:
  USER_SERVICE_HOST: "user-service"
  USER_SERVICE_PORT: "3001"
  COMMERCE_SERVICE_HOST: "commerce-service"
  COMMERCE_SERVICE_PORT: "3002"
