replicaCount: 1

image:
  repository: fanvault-ai-service
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 8000

containerPort: 8000

resources:
  requests:
    cpu: "100m"
    memory: "256Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

hpa:
  enabled: true
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  ingress:
    # Only commerce-service is permitted to call the AI service
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: commerce-service

# ServiceAccount with IRSA annotation for Bedrock, S3, CloudWatch, Secrets Manager access
serviceAccount:
  create: true
  name: ""
  annotations: {}

# Application configuration loaded via ConfigMap
config:
  PORT: "8000"
  ENVIRONMENT: "production"
  AWS_REGION: "us-east-1"
  AI_PROVIDER: "openai"
  OPENAI_MODEL_ID: "gpt-4o-mini"
  BEDROCK_MODEL_ID: "anthropic.claude-3-haiku-20240307-v1:0"
  AI_TIMEOUT_MS: "30000"
  S3_PRODUCT_IMAGES_BUCKET: "fanvault-product-images-PLACEHOLDER"
  USE_SECRETS_MANAGER: "false"
  SECRET_ID: "fanvault-dev-app-secrets"

# Secret variables (OPENAI_API_KEY set here for dev; prod loads from Secrets Manager)
secrets: {}
